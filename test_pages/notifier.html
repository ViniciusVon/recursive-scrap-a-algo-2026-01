<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Notificador - Teste</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 40px; background: #264653; min-height: 100vh; }
        .container { background: white; padding: 30px; border-radius: 10px; max-width: 500px; margin: 0 auto; }
        h1 { color: #333; margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; color: #555; }
        input[type="text"], textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px; box-sizing: border-box; }
        textarea { height: 100px; resize: vertical; }
        .btn { background: #e63946; color: white; border: none; padding: 15px 30px; font-size: 16px; cursor: pointer; border-radius: 5px; width: 100%; }
        .btn:hover { background: #d62836; }
        .notifications { margin-top: 30px; }
        .notification { background: #e8f5e9; padding: 15px; border-radius: 5px; margin-top: 10px; border-left: 4px solid #4caf50; }
        .notification-time { font-size: 12px; color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Central de Notificacoes</h1>

        <div class="form-group">
            <label for="message">Mensagem:</label>
            <textarea id="message" placeholder="A mensagem aparecera aqui..."></textarea>
        </div>

        <button class="btn" id="sendBtn" onclick="sendNotification()">Enviar Notificacao</button>

        <div class="notifications" id="notifications">
            <h3>Historico:</h3>
        </div>
    </div>

    <script>
        function sendNotification() {
            const message = document.getElementById('message').value;
            if (message.trim()) {
                const notifDiv = document.createElement('div');
                notifDiv.className = 'notification';
                const now = new Date().toLocaleTimeString('pt-BR');
                notifDiv.innerHTML = `<div class="notification-time">${now}</div><div>${message}</div>`;
                document.getElementById('notifications').appendChild(notifDiv);
                document.getElementById('message').value = '';
            }
        }
    </script>
</body>
</html>
